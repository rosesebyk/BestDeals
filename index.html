<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Deal Finder | Get Started</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="intro-hero">
      <div class="intro-backdrop"></div>
      <div class="intro-shell">
        <div class="intro-media">
          <span class="intro-float-card intro-card-left">New drop</span>
          <span class="intro-float-card intro-card-right">Top rated</span>
          <span class="intro-float-orb intro-orb-left"></span>
          <span class="intro-float-orb intro-orb-right"></span>
          <div class="intro-device-frame">
            <div class="intro-device-screen">
              <video
                class="intro-video"
                src="/assets/phone-rotate.mov"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
              ></video>
            </div>
          </div>
        </div>

        <div class="intro-copy">
          <p class="intro-kicker">Smart Deal Discovery</p>
          <h1>Get Started</h1>
          <p class="intro-text">
            Compare products across stores with a premium shopping experience, AI suggestions, and faster price checks.
          </p>
          <div class="intro-actions">
            <a class="intro-primary" href="app.html">Get Started</a>
            <a class="intro-secondary" href="app.html">Explore Deals</a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
